<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>

body{
  font-family: Arial, sans-serif;
  background: azure;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#665599;
  padding:20px;
  border-radius:20px;
  width:320px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

#screen{
  width:93%;
  height:60px;
  font-size:28px;
  text-align:right;
  padding:10px;
  border-radius:15px;
  border:2px solid floralwhite;
  margin-bottom:15px;
  background:aqua;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  background:azure;
  box-shadow:0 4px 6px rgba(0,0,0,0.2);
}

button:active{
  transform:scale(0.95);
}

.operator{
  background:orange;
}

.control{
  background:tan;
}

.equal{
  background:greenyellow;
  grid-column:span 3;
}

.plus{
  grid-row:span 3;
}

</style>
</head>

<body>

<div class="container">

<input id="screen" readonly>

<div class="buttons">

<button class="control">AC</button>
<button class="control">C</button>
<button class="control">OFF</button>
<button class="control">ON</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button class="operator">-</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button class="operator">×</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button class="operator">/</button>

<button class="equal">=</button>
<button class="operator plus">+</button>

</div>
</div>

<script>

const screen = document.getElementById("screen");
const buttons = document.querySelectorAll("button");

let power = true;

buttons.forEach(button => {

button.addEventListener("click", () => {

const value = button.textContent;

if(value === "ON"){
power = true;
screen.value = "";
return;
}

if(value === "OFF"){
power = false;
screen.value = "";
return;
}

if(!power) return;

if(value === "AC"){
screen.value = "";
}

else if(value === "C"){
screen.value = screen.value.slice(0,-1);
}

else if(value === "="){

try{
let expression = screen.value.replace("×","*");
screen.value = eval(expression);
}
catch{
screen.value = "Error";
}

}

else{
screen.value += value;
}

});

});

</script>

</body>
</html>
